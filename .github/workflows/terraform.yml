name: Terraform CI/CD

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  terraform:
    name: Terraform Workflow
    runs-on: ubuntu-latest

    env:
      TF_VERSION: 1.6.6
      GOOGLE_CREDENTIALS: ${{secrets.GPA_SA_KEY}}
      GOOGLE_PROJECT: proven-outpost-484307-j5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init


      - name: Terraform Plan
        run: terraform plan

      # Apply only on main branch (safe practice)
      - name: Terraform Apply
        if: github.ref == 'refs/heads/main'
        run: terraform apply -auto-approve