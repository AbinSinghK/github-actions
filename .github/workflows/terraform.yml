name: Terraform CI/CD

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  terraform:
    name: Terraform Workflow
    runs-on: ubuntu-latest

    env:
      TF_VERSION: 1.6.6
      GOOGLE_CREDENTIALS: ${{secrets.GPA_SA_KEY}}
      GOOGLE_PROJECT: proven-outpost-484307-j5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # ✅ Create credentials file
      - name: Create GCP credentials file
        run: echo '${{ secrets.GCP_SA_KEY }}' > gcp-key.json

      # ✅ Export standard env variable
      - name: Set GOOGLE_APPLICATION_CREDENTIALS
        run: echo "GOOGLE_APPLICATION_CREDENTIALS=$(pwd)/gcp-key.json" >> $GITHUB_ENV

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init
        working-directory: .github/


      - name: Terraform Plan
        run: terraform plan
        working-directory: .github/

      # Apply only on main branch (safe practice)
      - name: Terraform Apply
        if: github.ref == 'refs/heads/main'
        run: terraform apply -auto-approve
        working-directory: .github/