name: Terraform CI/CD

on:
  push:
    branches:
      - main
      
  workflow_dispatch:

jobs:
  terraform:
    name: Terraform Workflow
    runs-on: ubuntu-latest

    env:
      TF_VERSION: 1.6.6
      GOOGLE_PROJECT: proven-outpost-484307-j5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # ✅ Safely create GCP credentials file (no JSON corruption)
      - name: Create GCP credentials file
        run: |
          cat <<EOF > gcp-key.json
          ${{ secrets.GCP_SA_KEY }}
          EOF

      # ✅ Export credentials for Terraform / GCP
      - name: Set GOOGLE_APPLICATION_CREDENTIALS
        run: echo "GOOGLE_APPLICATION_CREDENTIALS=$(pwd)/gcp-key.json" >> $GITHUB_ENV

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      # ✅ Initialize Terraform
      - name: Terraform Init
        run: terraform init
        working-directory: ./.github

      # ✅ Validate (good practice)
      - name: Terraform Validate
        run: terraform validate
        working-directory: ./.github

      # ✅ Plan
      - name: Terraform Plan
        run: terraform plan
        working-directory: ./.github

      # ✅ Apply only on main branch
      - name: Terraform Apply
        if: github.ref == 'refs/heads/main'
        run: terraform apply -auto-approve
        working-directory: ./.github